<!DOCTYPE html>
<html>
<head>
  <title>Bellanora Products</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    pre {
      background-color: #f4f4f4;
      padding: 10px;
      border-radius: 4px;
      max-height: 300px;
      overflow: auto;
    }
  </style>
</head>
<body>

<h1>Bellanora Home</h1>
<input type="button" onclick="getAllProducts()" value="Get all products">
<div id="result"><pre></pre></div>

<script>
function getAllProducts() {
  $.ajax({
    type: 'GET',
    url: 'http://localhost:5000/api/products',
    success: function(data) {
      document.querySelector("#result pre").textContent = JSON.stringify(data, null, 2);
    },
    error: function(xhr, status, error) {
      console.error(error);
      document.querySelector("#result pre").textContent = "Error fetching products";
    }
  });
}
</script>

</body>
</html>
